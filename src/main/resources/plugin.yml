name: LPC
version: '${version}'
main: de.ayont.lpc.LPC
api-version: '26.2'
folia-supported: true
authors: [Ayont, Veylor-Development]
depend: [LuckPerms]
softdepend: [PlaceholderAPI]
description: Flexible MiniMessage chat formatter for LuckPerms (Minecraft 26.2 / Java 25 / Adventure 5)
website: https://modrinth.com/plugin/lpc-chat
commands:
  lpc:
    description: LPC chat formatter commands.
    usage: "Usage: /lpc <reload|version|help>"
permissions:
  lpc.reload:
    description: Allows reloading the LPC configuration.
    default: op
  lpc.chatcolor:
    description: Allows using colour codes and cosmetic MiniMessage tags in chat.
    default: false
  lpc.itemplaceholder:
    description: Allows using the [item] placeholder in chat.
    default: false
  lpc.update:
    description: Receive an update notification on join when a new version is available.
    default: op
  lpc.emoji:
    description: Use emoji shortcuts in chat (only enforced when emoji.require-permission is true).
    default: true
  lpc.chatlinks:
    description: Have URLs in your messages turned into clickable links.
    default: true
  lpc.mention.exempt:
    description: Opt out of receiving mention pings.
    default: false
  lpc.mute:
    description: Use /lpc mute and /lpc unmute.
    default: op
  lpc.muted:
    description: Marks a player as muted (usually granted by a punishment plugin).
    default: false
  lpc.bypass.spam:
    description: Bypass the anti-spam cooldown.
    default: op
  lpc.bypass.repeat:
    description: Bypass the repeated-message filter.
    default: op
  lpc.bypass.caps:
    description: Bypass the caps filter.
    default: op
  lpc.bypass.profanity:
    description: Bypass the profanity filter.
    default: op
  lpc.bypass.advert:
    description: Bypass the anti-advertising filter.
    default: op