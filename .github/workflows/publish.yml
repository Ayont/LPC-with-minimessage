name: Gradle publish

on:
  release:
    types: [ created ]

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Gradle 8.14 cannot compile build scripts while running ON Java 25 (its bundled Groovy/ASM
      # rejects class file major 69). So Gradle runs on Java 21 and the Java 25 toolchain compiles
      # the plugin (auto-provisioned by the foojay resolver in settings.gradle).
      - name: Set up Java 21 (Gradle runtime + 25 toolchain via foojay)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: 'gradle'
      - uses: gradle/actions/setup-gradle@v6
      - name: Configure Git
        run: git config --global user.email "no-reply@github.com" && git config --global user.name "Github Actions"
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Get commit hash
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV
      - name: Set version
        env:
          RELEASE_NAME: ${{ github.event.release.name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          VERSION="$RELEASE_NAME"
          if [ "$IS_PRERELEASE" = "true" ]; then
            FULL_VERSION="${VERSION}-commit-${COMMIT_HASH}"
            echo "VERSION_TYPE=beta" >> "$GITHUB_ENV"
          else
            FULL_VERSION="${VERSION}"
            echo "VERSION_TYPE=release" >> "$GITHUB_ENV"
          fi
          echo "Setting version to $FULL_VERSION"
          sed -i "s/^project_version = .*/project_version = ${FULL_VERSION}/" gradle.properties
          echo "FULL_VERSION=$FULL_VERSION" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
      - name: Build Jar
        run: |
          ./gradlew clean
          ./gradlew shadowJar --no-daemon --stacktrace --refresh-dependencies
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          fail_on_unmatched_files: true
